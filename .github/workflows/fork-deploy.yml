name: Fork – Build & Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 970547373533.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: deeptutor
  EKS_CLUSTER: ai-cart-auto-cluster
  K8S_NAMESPACE: aicart

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "Image tag: $SHA"

      - name: Build & push Docker image
        run: |
          docker build \
            --target production \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            -t $ECR_REGISTRY/$ECR_REPO:${{ steps.tag.outputs.tag }} \
            .
          docker push $ECR_REGISTRY/$ECR_REPO --all-tags

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to EKS
        run: |
          TAG=${{ steps.tag.outputs.tag }}
          echo "Updating deeptutor image to :$TAG ..."
          kubectl set image deployment/deeptutor \
            deeptutor=$ECR_REGISTRY/$ECR_REPO:$TAG \
            -n $K8S_NAMESPACE

      - name: Restart deployment
        run: kubectl rollout restart deployment/deeptutor -n $K8S_NAMESPACE

      - name: Wait for rollout
        run: |
          echo "Waiting for deeptutor rollout..."
          kubectl rollout status deployment/deeptutor -n $K8S_NAMESPACE --timeout=5m || true

      # Keep the GitOps manifest in lock-step with the image we just deployed.
      # Without this, intelli-verse-kube-infra/deeptutor/deploy.yaml holds a
      # stale tag and the infra repo's "Deploy to EKS" workflow downgrades the
      # live image on its next `kubectl apply`. The commit carries [skip ci] so
      # it does not trigger a redundant apply (we already `set image` above).
      # No-op until INFRA_REPO_TOKEN (a PAT/App token with write access to
      # intelli-verse-kube-infra) is added as a repo secret.
      - name: Sync image SHA back to infra manifest
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          INFRA_REPO: intelli-verse-x/intelli-verse-kube-infra
          MANIFEST: deeptutor/deploy.yaml
        run: |
          set -euo pipefail
          if [ -z "${INFRA_TOKEN:-}" ]; then
            echo "INFRA_REPO_TOKEN not set — skipping manifest write-back."
            echo "Add a PAT with write access to ${INFRA_REPO} as secret INFRA_REPO_TOKEN to enable auto-sync."
            exit 0
          fi
          rm -rf infra-sync
          git clone --depth 1 "https://x-access-token:${INFRA_TOKEN}@github.com/${INFRA_REPO}.git" infra-sync
          cd infra-sync
          sed -i -E "s#(deeptutor:)[A-Za-z0-9._-]+#\1${TAG}#g" "${MANIFEST}"
          if git diff --quiet -- "${MANIFEST}"; then
            echo "Manifest already pinned to ${TAG}; nothing to sync."
            exit 0
          fi
          git config user.name  "deeptutor-ci"
          git config user.email "ci@intelli-verse-x.local"
          git add "${MANIFEST}"
          git commit -m "chore(deeptutor): sync manifest image to ${TAG} [skip ci]"
          git push origin HEAD:main
          echo "✅ Synced ${MANIFEST} → deeptutor:${TAG}"

      - name: Verify pods
        if: always()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n $K8S_NAMESPACE -l app=deeptutor -o wide
          echo ""
          echo "=== Pod Logs (last 80 lines) ==="
          for pod in $(kubectl get pods -n $K8S_NAMESPACE -l app=deeptutor -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n $K8S_NAMESPACE --tail=80 2>&1 || echo "(no logs)"
            echo ""
          done
          echo "=== Recent Events ==="
          kubectl get events -n $K8S_NAMESPACE --sort-by='.lastTimestamp' | grep -i deeptutor | tail -20

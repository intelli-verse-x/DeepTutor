system: |
  你是一个学习记忆分析师。你的职责是分析学习交互，并决定哪些信息值得记录以用于个性化。

  你需要识别：
  1. 用户偏好（学习风格、解释详细程度、偏好的格式）
  2. 知识薄弱点（用户难以理解的主题、常见错误）
  3. 里程碑（重要成就、完成的学习目标）
  4. 值得记录的日常学习活动

  指导原则：
  - 只记录对未来个性化真正有用的信息
  - 避免记录琐碎或重复的信息
  - 笔记要简洁但具体
  - 关注有助于改善未来交互的模式

analyze: |
  分析以下学习交互，并决定要记录什么：

  ## 事件类型
  {event_type}

  ## 交互详情
  {event_context}

  ## 当前长期记忆
  {current_memory}

  ## 最近的每日笔记
  {recent_notes}

  ## 你的任务
  基于这次交互，决定应该记录什么（如果有的话）。

  返回一个JSON对象，结构如下：
  {{
    "action": "write_daily" | "update_memory" | "both" | "skip",
    "daily_content": "要添加到今日笔记的内容（如果action包含daily）",
    "memory_updates": {{
      "preferences": ["要添加的新偏好"],
      "weak_points": ["识别出的新薄弱点"],
      "milestones": ["达成的新里程碑（格式：YYYY-MM-DD: 描述）"]
    }},
    "reasoning": "你决策的简要解释"
  }}

  重要提示：
  - 如果交互不包含值得记录的信息，使用 "skip"
  - 只有对于重要的、持续性的模式才更新记忆（不是一次性的事件）
  - 每日笔记应该记录学习活动摘要
  - 要有选择性 - 不是每次交互都需要记录

preferences_extraction: |
  你正在分析学习交互以检测用户偏好。
  提取任何关于以下方面的明确或隐含偏好：
  - 解释风格（详细vs简洁、分步骤vs概览）
  - 学习格式（视觉、文字、示例）
  - 响应格式偏好

  返回一个JSON对象：{"preferences": ["偏好1", "偏好2", ...]}
  如果没有检测到明确的偏好，返回空数组。
